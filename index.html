<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.3">
    <title>东吴证券 2026 春季实习生招聘</title>
    <script src="./wechat/jweixin-1.0.0.js"></script>
    <script src="./wechat/share.js"></script>
    <script type="text/javascript" src="js/init.js"></script>
    <script>
        (function () {
            var isMobileViewport = window.matchMedia('(max-width: 768px)').matches
                || window.matchMedia('(max-device-width: 768px)').matches
                || window.matchMedia('(hover: none) and (pointer: coarse)').matches;
            var isMobileUA = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

            if (isMobileViewport || isMobileUA) {
                document.documentElement.classList.add('is-mobile');
            }
        })();
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            min-width: 1200px;
            background: #0f5298;
        }

        body {
            font-family: 'Source Han Sans SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
        }

        .is-mobile body {
            min-width: 0;
            overflow-x: hidden;
        }

        .landing {
            position: relative;
            width: 100%;
            min-width: 1200px;
            height: 100vh;
            min-height: 760px;
            overflow: hidden;
            background: url('./images/pc_enter_1.png') no-repeat top center;
            background-size: 100% auto;
        }

        .enter-btn {
            position: absolute;
            left: 50%;
            margin-top: 18vw;
            transform: translateX(-50%);
            display: block;
            width: 15vw;
            min-width: 180px;
            height: 100px;
            background: url('./images/pc_enter_btn.png') no-repeat center center;
            background-size: contain;
            text-indent: -9999px;
            overflow: hidden;
        }

        .is-mobile .landing {
            min-width: 0;
            min-height: 100svh;
            height: 100svh;
            background: url('./images/mobile_enter_1.png') no-repeat top center;
            background-size: 100% auto;
        }

        .is-mobile .enter-btn {
            margin-top: 93vw;
            width: 59vw;
            height: 26vw;
            min-width: 0;
        }

        @media screen and (max-width: 768px) {

            html,
            body {
                min-width: 0;
                overflow-x: hidden;
            }

            .landing {
                min-width: 0;
                min-height: 100svh;
                height: 100svh;
                background: url('./images/mobile_enter_1.png') no-repeat top center;
                background-size: 100% auto;
            }

            .enter-btn {
                margin-top: 93vw;
                width: 59vw;
                height: 26vw;
            }
        }
    </style>
</head>

<body>
    <main class="landing">
        <a class="enter-btn" href="./zjdongwu.html"></a>
    </main>
</body>

</html>
