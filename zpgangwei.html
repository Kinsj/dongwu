        let activePositionIndex = 0;
        let expandedOpeningIndexes = [0];

        function renderTabs() {
            jobTabs.innerHTML = jobData.map((item, index) => `
                <button class="job-tab ${index === activeTabIndex ? 'is-active' : ''}" data-tab-index="${index}">
                    ${item.tab}
                </button>
            `).join('');
        }

        function renderList() {
            const currentTab = jobData[activeTabIndex];
            if (!currentTab.departments.length) {
                jobList.innerHTML = '';
                return;
            }
            jobList.innerHTML = currentTab.departments.map((item, index) => `
                <button class="job-list-item ${index === activePositionIndex ? 'is-active' : ''}" data-position-index="${index}">
                    ${item.name}
                </button>
            `).join('');
        }

        function renderDetail() {
            const currentTab = jobData[activeTabIndex];
            const department = currentTab.departments[activePositionIndex];

            if (!department) {
                jobDetailBody.innerHTML = '<div class="job-empty-state">当前没有可展示的岗位资料</div>';
                return;
            }

            jobDetailBody.innerHTML = `
                <div class="job-openings">
                    ${department.positions.map((position, index) => {
                const isExpanded = expandedOpeningIndexes.includes(index);
                return `
                        <div class="job-opening">
                            <button class="job-opening-header" type="button" data-opening-index="${index}">
                                <span class="job-opening-title">${position.title}</span>
                                <span class="job-opening-toggle">${isExpanded ? '−' : '+'}</span>
                            </button>
                            ${isExpanded ? `
                            <div class="job-opening-body">
                                <div class="job-detail-meta"><strong>专业名称：</strong>${position.major}</div>
                                <div class="job-detail-meta"><strong>学历要求：</strong>${position.education}</div>
                                <div class="job-detail-section">
                                    <div class="job-detail-section-title">岗位职责：</div>
                                    <ul class="job-detail-list">
                                        ${position.responsibilities.map((item, itemIndex) => `<li>${itemIndex + 1}. ${item}</li>`).join('')}
                                    </ul>
                                </div>

                                    <div class="job-detail-section-title">岗位要求：</div>
                                    <ul class="job-detail-list">
                                        ${position.requirements.map((item, itemIndex) => `<li>${itemIndex + 1}. ${item}</li>`).join('')}
                                    </ul>
                                </div>
                                <div class="job-detail-action">
                                    <button class="job-apply-btn" type="button">立即申请</button>
                                </div>
                            </div>

                        </div>

            `;
        }

            renderList();
            renderDetail();

            const button = event.target.closest('[data-tab-index]');
            if (!button) {
                return;
            }
            activeTabIndex = Number(button.dataset.tabIndex);
            activePositionIndex = 0;
            expandedOpeningIndexes = [0];

            activePositionIndex = Number(button.dataset.positionIndex);
